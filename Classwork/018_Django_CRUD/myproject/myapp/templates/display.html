<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: #f4f7fc;
            font-family: 'Segoe UI', sans-serif;
        }

        .table-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            color: white;
            padding: 20px 25px;
        }

        .table thead th {
            background-color: #f8f9ff;
            color: #495057;
            font-weight: 600;
            border: none;
        }

        .table tbody tr {
            transition: all 0.3s ease;
        }

        .table tbody tr:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, .08);
            background-color: #fafbff;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #2563eb;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .status-active {
            background: #dcfce7;
            color: #166534;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .btn-action {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .table> :not(caption)>*>* {
            padding: 1rem;
        }
    </style>
</head>

<body>

    <div class="container py-5">

        <div class="card table-card shadow-lg">

            <div class="card-header-custom d-flex justify-content-between align-items-center">
                <div>
                    <h3 class="mb-0">User Management</h3>
                    <small>Manage and view user information</small>
                </div>
            </div>

            <div class="card-body">

                <div class="table-responsive">
                    <table class="table align-middle">

                        <thead>
                            <tr>
                                <th>Sr.no</th>
                                <th>ID</th>
                                <th>User</th>
                                <th>Email</th>
                                <th>Age</th>
                                <th colspan="2">Actions</th>
                            </tr>
                        </thead>

                        <tbody>
                            {%for student in students%}
                            <tr>
                                <td>{{forloop.counter}}</td>
                                <td>{{student.id}}</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="avatar me-3">J</div>
                                        <div>
                                            <strong>{{student.name}}</strong>
                                        </div>
                                    </div>
                                </td>
                                <td>{{student.email}}</td>
                                <td>{{student.age}}</td>
                                <td>
                                    <a href="{% url 'delete' %}?id={{ student.id }}" class="btn btn-danger btn-sm">
                                        🗑 Delete
                                    </a>
                                </td>

                                <td>
                                    <a href="{% url 'update'%}?id={{student.id}}" class="btn btn-primary btn-sm">
                                         ✏ Update
                                    </a>
                                </td>
                            </tr>
                            {%endfor%}


                        </tbody>

                    </table>

                    <a href="{%url 'index'%}" class="btn btn-success">Add Student</a>
                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
