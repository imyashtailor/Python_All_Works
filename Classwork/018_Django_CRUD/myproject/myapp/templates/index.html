<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 35px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .register-card h2 {
            color: #4f46e5;
            font-weight: 700;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px;
        }

        .form-control:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 10px rgba(79, 70, 229, 0.25);
        }

        .btn-save {
            background: linear-gradient(135deg, #4f46e5, #2563eb);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        .btn-display {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
        }

        .success-msg {
            display: block;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="register-card">

        <h2 class="text-center mb-4">
            <i class="bi bi-person-plus-fill"></i>
            Student Registration
        </h2>

        {% if msg %}
            <span class="success-msg text-success">
                {{ msg }}
            </span>
        {% endif %}

        <form method="post" action="{% url 'create' %}">
            {% csrf_token %}

            <input type="hidden" name="id" value="{{student.id}}">

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input
                    type="text"
                    class="form-control"
                    name="name"
                    placeholder="Enter your full name"
                    required value="{{student.name}}">
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input
                    type="email"
                    class="form-control"
                    name="email"
                    placeholder="Enter your email"
                    required value="{{student.email}}">
            </div>

            <div class="mb-4">
                <label class="form-label">Age</label>
                <input
                    type="number"
                    class="form-control"
                    name="age"
                    placeholder="Enter your age"
                    min="1"
                    required value="{{student.age}}">
            </div>

            <div class="d-grid gap-3">

                {% if student %}
                <button type="submit" class="btn btn-save text-white">
                    <i class="bi bi-save"></i> Update Data
                </button>
                {%else%}
                <button type="submit" class="btn btn-save text-white">
                    <i class="bi bi-save"></i> Save Data
                </button>
                {%endif%}
                <a href="{% url 'display' %}" class="btn btn-outline-success btn-display">
                    <i class="bi bi-table"></i> Display Records
                </a>

            </div>

        </form>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
