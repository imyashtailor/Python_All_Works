<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Product Form</h4>
                </div>
                <div class="card-body">
                    <span class="text-success">{{msg}}</span>
                    <form method="post" action="{%url 'create'%}" enctype="multipart/form-data">
                        <input type="hidden" name="id" value="{{product.id}}">
                        {%csrf_token%}
                        <!-- Name -->
                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="name" placeholder="Enter product name" name="name" value="{{product.name}}">
                        </div>

                        <!-- Price -->
                        <div class="mb-3">
                            <label for="price" class="form-label">Price</label>
                            <input type="number" class="form-control" id="price" placeholder="Enter price" name="price" value="{{product.price}}">
                        </div>

                        <!-- Quantity -->
                        <div class="mb-3">
                            <label for="qty" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="qty" placeholder="Enter quantity" name="qty" value="{{product.qty}}">
                        </div>

                        <!-- Image -->
                        <div class="mb-3">
                            <label for="qty" class="form-label">Image</label>
                            <input type="file" class="form-control"  name="image">
                        </div>

                        <!-- Category -->
                        <div class="mb-3">
                            <label for="category" class="form-label">Category</label>
                            <select class="form-select" id="category" name="cat">
                                <option selected>Select Category</option>
                                {%for cat in categories%}
                                <option value="{{cat.id}}" {%if cat.id == product.category.id%}selected{%endif%}>{{cat.name}}</option>
                                {%endfor%}
                            </select>
                        </div>

                        <!-- Buttons -->
                        <div class="d-grid gap-2">
                            {%if product%}
                            <button type="submit" class="btn btn-success">Update Student</button>
                            {%else%}
                            <button type="submit" class="btn btn-success">Save Product</button>
                            {%endif%}
                            <a href="{%url 'display'%}" class="btn btn-secondary">Display data</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
