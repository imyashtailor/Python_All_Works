<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;

            background: linear-gradient(
                135deg,
                #2A7B9B 0%,
                #57C785 50%,
                #EDDD53 100%
            );
        }

        .register-card{
            width:400px;
            padding:35px;

            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(15px);

            border-radius:20px;
            border:1px solid rgba(255,255,255,0.15);

            box-shadow:0 15px 35px rgba(0,0,0,0.3);
        }

        .register-card h2{
            color:white;
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }

        .form-control{
            background:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.2);
            color:white;
            height:48px;
        }

        .form-control:focus{
            background:rgba(255,255,255,0.15);
            color:white;
            border-color:#57C785;
            box-shadow:0 0 10px rgba(87,199,133,0.5);
        }

        .form-control::placeholder{
            color:rgba(255,255,255,0.7);
        }

        .btn-register{
            background:#57C785;
            border:none;
            font-weight:600;
        }

        .btn-register:hover{
            background:#46b46d;
        }

        .btn-reset{
            background:#dc3545;
            border:none;
            font-weight:600;
        }

        .btn-reset:hover{
            background:#bb2d3b;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>Create Account</h2>

        <form>
            <div class="mb-3">
                <input type="text"
                       class="form-control"
                       placeholder="Username"
                       required>
            </div>

            <div class="mb-3">
                <input type="email"
                       class="form-control"
                       placeholder="Email Address"
                       required>
            </div>

            <div class="mb-4">
                <input type="password"
                       class="form-control"
                       placeholder="Password"
                       required>
            </div>

            <div class="d-grid gap-2">
                <button type="submit"
                        class="btn btn-register text-white">
                    Register
                </button>

                <button type="reset"
                        class="btn btn-reset text-white">
                    Reset
                </button>
            </div>
        </form>
    </div>

</body>
</html>
