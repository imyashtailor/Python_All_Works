<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #2563eb);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .3);
        }

        .form-control {
            height: 50px;
            border-radius: 10px;
        }

        .btn-login {
            background: #2563eb;
            border: none;
            height: 50px;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn-login:hover {
            background: #1d4ed8;
        }

        .card-title {
            font-weight: 700;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-4 col-md-6">

                <div class="card p-4">

                    <div class="card-body">

                        <h2 class="text-center card-title mb-4">
                            Welcome Back
                        </h2>
                        <span class="text-danger">{{err}}</span>
                        <form method="post">
                            {%csrf_token%}
                            <div class="mb-3">
                                <label class="form-label">
                                    Username
                                </label>

                                <input type="text" class="form-control" name="username" placeholder="Enter Username"
                                    required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password" class="form-control" name="password" placeholder="Enter Password"
                                    required>

                            </div>

                            <button class="btn btn-login text-white w-100">
                                Login
                            </button>

                        </form>

                        <div class="text-center mt-4">

                            Don't have an account?

                            <a href="{%url 'reg'%}" class="text-decoration-none fw-bold">
                                Register
                            </a>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
