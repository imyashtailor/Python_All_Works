<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(135deg,#4f46e5,#06b6d4);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    border:none;
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

.form-control{
    border-radius:10px;
    height:50px;
}

.btn-register{
    background:#4f46e5;
    border:none;
    height:50px;
    border-radius:10px;
    font-weight:bold;
}

.btn-register:hover{
    background:#3730a3;
}

.card-title{
    font-weight:700;
}
</style>

</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">

            <div class="card p-4">

                <div class="card-body">

                    <h2 class="text-center card-title mb-4">
                        Create Account
                    </h2>
                    <span class="text-success">{{msg}}</span>
                    <form method="post" action="">
                        {%csrf_token%}
                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="firstname"
                                placeholder="Enter First Name"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <input
                                type="text"
                                class="form-control"
                                name="lastname"
                                placeholder="Enter Last Name"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input
                                type="text"
                                class="form-control"
                                name="username"
                                placeholder="Choose Username"
                                required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input
                                type="password"
                                class="form-control"
                                name="password"
                                placeholder="Create Password"
                                required>
                        </div>

                        <button class="btn btn-register text-white w-100">
                            Register
                        </button>

                    </form>

                    <div class="text-center mt-4">
                        Already have an account?
                        <a href="{%url 'index'%}" class="text-decoration-none fw-bold">
                            Login
                        </a>
                    </div>

                </div>

            </div>

        </div>
    </div>
</div>

</body>
</html>
